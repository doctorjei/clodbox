name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - 'src/kanibako/containers/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - variant: min
            base: ghcr.io/doctorjei/droste-seed:latest
          - variant: oci
            base: ghcr.io/doctorjei/droste-fiber:latest
          - variant: lxc
            base: ghcr.io/doctorjei/droste-thread:latest
          - variant: vm
            base: ghcr.io/doctorjei/droste-hair:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: src/kanibako/containers/
          file: src/kanibako/containers/Containerfile.kanibako
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kanibako-${{ matrix.variant }}:latest
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
