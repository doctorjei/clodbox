# kanibako default tmux configuration

# UTF-8 support
set -gq utf8 on
set -gq status-utf8 on

# Mouse off — let applications (Claude Code, etc.) handle scroll events
set -g mouse off

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback buffer
set -g history-limit 50000
